# ============================================================
# GitHub Actions: Deploy to Cloudflare Pages
# 【トリガー】GitHubのmainブランチにpushされたとき
# 【動作】
#   1. Next.jsをビルド（npm run build）
#   2. public/admin を out/admin にコピー（強制上書き）
#   3. Cloudflare Pagesにデプロイ
# ============================================================

name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      deployments: write

    steps:
      # -------------------------------------------------------
      # 1. コードを取得
      # -------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------------------------------------
      # 2. Node.js セットアップ
      # -------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # -------------------------------------------------------
      # 3. 依存パッケージのインストール
      # -------------------------------------------------------
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit
          else
            npm install --no-audit
          fi

      # -------------------------------------------------------
      # 4. カラー変換スクリプト（存在する場合のみ実行）
      # -------------------------------------------------------
      - name: Convert colors (if script exists)
        run: |
          if [ -f scripts/convert-colors.js ]; then
            npm run convert-colors
          else
            echo "convert-colors script not found - skipping"
          fi

      # -------------------------------------------------------
      # 5. Next.js ビルド
      # -------------------------------------------------------
      - name: Build
        run: npm run build

      # -------------------------------------------------------
      # 6. CMS用adminフォルダをコピー（強制上書き）
      # -------------------------------------------------------
      - name: Copy admin folder to build output
        run: |
          echo "📁 Copying admin folder to build output..."
          if [ -d "public/admin" ]; then
            rm -rf out/admin
            mkdir -p out/admin
            cp -r public/admin/* out/admin/
            touch out/.nojekyll
            
            echo "✅ Admin folder copied successfully!"
            echo ""
            echo "📋 Full out/ directory structure:"
            find out -type f | head -50
            echo ""
            echo "📋 Files in out/admin:"
            ls -la out/admin/
            echo ""
            echo "📄 index.html content (first 20 lines):"
            head -20 out/admin/index.html
            echo ""
            echo "📄 Checking if admin.html exists:"
            ls -la out/admin.html 2>/dev/null || echo "admin.html not found (good)"
            echo ""
            echo "📄 Checking if admin/index exists without extension:"
            ls -la out/admin/index 2>/dev/null || echo "admin/index not found (good)"
          else
            echo "❌ Error: public/admin folder not found!"
            exit 1
          fi

      # -------------------------------------------------------
      # 7. Cloudflare Pages にデプロイ
      # -------------------------------------------------------
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
          directory: out
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}


