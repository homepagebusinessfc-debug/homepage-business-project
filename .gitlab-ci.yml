stages:
  - verify
  - convert
  - build
  - deploy
  - sync

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm
    - node_modules/
    - .next/cache/

# 1. verify
verify:
  stage: verify
  script:
    - echo "===== Verifying project structure ====="
    - Get-ChildItem -Force
    - echo "===== Checking components directory ====="
    - if (Test-Path "components") { Get-ChildItem components } else { echo "components directory not found!" }
    - echo "===== Checking app directory ====="
    - Get-ChildItem app
    - echo "===== Checking tsconfig.json ====="
    - if (Test-Path "tsconfig.json") { Get-Content tsconfig.json } else { echo "tsconfig.json not found!" }
    - echo "===== Checking package.json ====="
    - Get-Content package.json
  only:
    - main
    - develop

# 2. convert-colors
convert-colors:
  stage: convert
  script:
    - echo "Node version:"
    - node --version
    - echo "NPM version:"
    - npm --version
    - echo "===== Installing dependencies ====="
    - if (Test-Path "package-lock.json") { npm ci } else { npm install }
    - echo "===== Converting colors ====="
    - if (Test-Path "scripts/convert-colors.js") { npm run convert-colors } else { echo "Warning: convert-colors.js not found" }
  artifacts:
    paths:
      - app/
      - components/
    expire_in: 1 hour
  only:
    - main
    - develop

# 3. build
build:
  stage: build
  dependencies:
    - convert-colors
  script:
    - echo "===== Starting build process ====="
    - if (Test-Path "package-lock.json") { npm ci } else { npm install }
    - npm run build
  artifacts:
    paths:
      - out/
    expire_in: 1 hour
  only:
    - main
    - develop

# 4. deploy (GitLab Pages)
pages:
  stage: deploy
  dependencies:
    - build
  script:
    - echo "===== Deploying to GitLab Pages ====="
    - New-Item -ItemType Directory -Force -Path public
    - if (Test-Path "out") {
        Copy-Item "out/*" "public" -Recurse -Force
      } else {
        echo "out folder not found"
        Get-ChildItem
        exit 1
      }
  artifacts:
    paths:
      - public
  only:
    - main

# 5. sync_to_github
sync_to_github:
  stage: sync
  only:
    - main
  script:
    - echo "===== Syncing to GitHub ====="
    - git config --global user.name "GitLab CI"
    - git config --global user.email "ci@gitlab.com"
    - git fetch --all
    - git remote add github https://${env:GITHUB_TOKEN}@github.com/${env:GITHUB_REPO}.git `
        -ErrorAction SilentlyContinue
    - git remote set-url github https://${env:GITHUB_TOKEN}@github.com/${env:GITHUB_REPO}.git
    - git push github HEAD:main --force
    - echo "Successfully synced to GitHub"
