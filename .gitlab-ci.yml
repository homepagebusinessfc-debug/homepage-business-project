# ============================================================
# Windows PowerShell用 .gitlab-ci.yml
# 【動作条件】WindowsマシンでGitLab Runnerが起動しているときのみ実行
# 【スマホ運用】GitHubに直接コミット → GitHub Actionsでデプロイ
# ============================================================

stages:
  - verify
  - convert
  - build
  - deploy
  - sync


variables:
  npm_config_cache: "C:\\npm-cache"


cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/
    - .next/


# ====================
# verify
# ====================

verify:
  stage: verify
  tags:
    - windows
  before_script:
    - git config --global core.longPaths true
  script:
    - |
      Write-Host "===== Verifying project structure ====="
      Get-ChildItem
      if (Test-Path components) { Get-ChildItem components }
      if (Test-Path app) { Get-ChildItem app }
      if (Test-Path package.json) { Get-Content package.json }
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'


# ====================
# convert
# ====================

convert-colors:
  stage: convert
  tags:
    - windows
  before_script:
    - git config --global core.longPaths true
    - npm cache clean --force
  script:
    - |
      Write-Host "===== Installing dependencies ====="
      if (Test-Path package-lock.json) {
        npm ci --no-audit
      } else {
        npm install --no-audit
      }

      if (Test-Path scripts/convert-colors.js) {
        npm run convert-colors
      } else {
        Write-Host "convert script not found - skipping"
      }
  artifacts:
    paths:
      - app/
      - components/
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'


# ====================
# build
# ====================

build:
  stage: build
  tags:
    - windows
  dependencies:
    - convert-colors
  before_script:
    - npm cache clean --force
  script:
    - |
      if (Test-Path package-lock.json) {
        npm ci --no-audit
      } else {
        npm install --no-audit
      }
      npm run build
  artifacts:
    paths:
      - out/
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'


# ====================
# GitLab Pages
# （Windows Runner使用時のみ動作）
# ====================

pages:
  stage: deploy
  tags:
    - windows
  dependencies:
    - build
  script:
    - |
      if (-not (Test-Path public)) {
        New-Item -ItemType Directory -Path public
      }
      Copy-Item out\* public\ -Recurse -Force
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'


# ====================
# Cloudflare Pages
# （Windows Runner使用時のみ動作）
# ====================

deploy_cloudflare_pages:
  stage: deploy
  tags:
    - windows
  dependencies:
    - build
  before_script:
    - npm install --no-audit --no-fund wrangler
  script:
    - |
      Write-Host "===== Deploy Cloudflare Pages ====="
      npx wrangler pages deploy out `
        --project-name $env:CLOUDFLARE_PROJECT_NAME `
        --branch main
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'


# ====================
# GitHub Sync
# GitLabのコードをGitHubに同期する
# （Windows Runner使用時のみ動作）
# 【修正ポイント】
#   - GIT_STRATEGY: clone で毎回クリーンな状態から取得
#   - --unshallow で完全な履歴を確保
#   - PowerShell の変数記法を統一（${env:XXX}）
#   - エラー時に詳細ログを出力
# ====================

sync_to_github:
  stage: sync
  tags:
    - windows
  variables:
    GIT_DEPTH: 0          # shallow cloneを無効化
    GIT_STRATEGY: clone   # 毎回クリーンなcloneを実行（ファイルが確実に届く）
  script:
    - |
      Write-Host "===== Syncing to GitHub ====="

      # Git設定
      git config --global user.name "GitLab CI"
      git config --global user.email "ci@gitlab.com"
      git config --global core.longPaths true

      # 現在の状態を確認（デバッグ用）
      Write-Host "Current branch: $(git branch --show-current)"
      Write-Host "Current commit: $(git rev-parse HEAD)"
      Write-Host "Files in repository:"
      Get-ChildItem -Name

      # shallow cloneの場合は完全な履歴に変換
      $isShallow = git rev-parse --is-shallow-repository
      if ($isShallow -eq "true") {
        Write-Host "Unshallowing repository..."
        git fetch --unshallow
      } else {
        git fetch --all --prune
      }

      # GitHub remoteを設定
      git remote remove github 2>$null
      git remote add github https://${env:GITHUB_TOKEN}@github.com/${env:GITHUB_REPO}.git
      Write-Host "GitHub remote configured: $env:GITHUB_REPO"

      # mainブランチに切り替え
      git checkout -B main

      # pushする内容を確認（デバッグ用）
      Write-Host "Commits to push:"
      git log --oneline -5

      # GitHub へ push（force pushで確実に同期）
      Write-Host "Pushing to GitHub..."
      git push github main:main --force

      Write-Host "===== Sync to GitHub completed successfully ====="
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  allow_failure: false
