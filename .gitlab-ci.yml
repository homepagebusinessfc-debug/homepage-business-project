# Windows PowerShell用の.gitlab-ci.yml

stages:
  - verify
  - convert
  - build
  - deploy
  - sync

variables:
  npm_config_cache: "C:\\npm-cache"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - C:\\npm-cache
    - node_modules/
    - .next/cache/

# ファイル構造を確認
verify:
  stage: verify
  tags:
    - windows
  before_script:
    - git config --global core.longPaths true
  script:
    - |
      Write-Host "===== Verifying project structure ====="
      Get-ChildItem
      Write-Host "===== Checking components directory ====="
      if (Test-Path components) { Get-ChildItem components } else { Write-Host "components directory not found!" }
      Write-Host "===== Checking app directory ====="
      Get-ChildItem app
      Write-Host "===== Checking tsconfig.json ====="
      if (Test-Path tsconfig.json) { Get-Content tsconfig.json } else { Write-Host "tsconfig.json not found!" }
      Write-Host "===== Checking package.json ====="
      Get-Content package.json
  only:
    - main
    - develop

# 色の一括変換ステージ
convert-colors:
  stage: convert
  tags:
    - windows
  before_script:
    - git config --global core.longPaths true
    - npm cache clean --force
  script:
    - |
      Write-Host "Node version:" (node --version)
      Write-Host "NPM version:" (npm --version)
      Write-Host "===== Installing dependencies ====="
      if (Test-Path package-lock.json) {
        npm ci --prefer-offline --no-audit
      } else {
        npm install --prefer-offline --no-audit
      }
      Write-Host "===== Converting colors from red to yellow ====="
      if (Test-Path scripts/convert-colors.js) {
        npm run convert-colors
      } else {
        Write-Host "⚠️  Warning: scripts/convert-colors.js not found, skipping color conversion"
      }
      Write-Host "===== Color conversion completed ====="
  artifacts:
    paths:
      - app/
      - components/
    expire_in: 1 hour
  only:
    - main
    - develop

# ビルド
build:
  stage: build
  tags:
    - windows
  dependencies:
    - convert-colors
  before_script:
    - git config --global core.longPaths true
    - npm cache clean --force
  script:
    - |
      Write-Host "Node version:" (node --version)
      Write-Host "NPM version:" (npm --version)
      Write-Host "===== Starting build process ====="
      if (Test-Path package-lock.json) {
        npm ci --prefer-offline --no-audit
      } else {
        npm install --prefer-offline --no-audit
      }
      npm run build
  artifacts:
    paths:
      - out/
    expire_in: 1 hour
  only:
    - main
    - develop

# GitLab Pagesへのデプロイ
pages:
  stage: deploy
  tags:
    - windows
  dependencies:
    - build
  before_script:
    - git config --global core.longPaths true
  script:
    - |
      Write-Host "===== Deploying to GitLab Pages ====="
      if (-not (Test-Path public)) {
        New-Item -ItemType Directory -Path public
      }
      if (Test-Path out) {
        Copy-Item -Path out/* -Destination public/ -Recurse -Force
      } else {
        Write-Host "エラー: out/フォルダが見つかりません"
        Write-Host "利用可能なフォルダ:"
        Get-ChildItem
        exit 1
      }
  artifacts:
    paths:
      - public
  only:
    - main

# GitHubへの同期（プライベートリポジトリ）
sync_to_github:
  stage: sync
  tags:
    - windows
  only:
    - main
  before_script:
    - git config --global core.longPaths true
  script:
    - |
      $ProgressPreference = 'SilentlyContinue'
      
      Write-Host "===== Syncing to GitHub ====="
      Write-Host "GitHub Repo: ${env:GITHUB_REPO}"
      
      git config --global user.name "GitLab CI"
      git config --global user.email "ci@gitlab.com"
      
      Write-Host "===== Checking if GitHub repository exists ====="
      $repoExists = $false
      $repoInfo = $null
      
      try {
        $response = Invoke-WebRequest `
          -Uri "https://api.github.com/repos/${env:GITHUB_REPO}" `
          -Headers @{Authorization = "token ${env:GITHUB_TOKEN}"} `
          -Method Get `
          -UseBasicParsing `
          -ErrorAction Stop
        
        $repoExists = $true
        $repoInfo = $response.Content | ConvertFrom-Json
        Write-Host "✅ Repository exists on GitHub"
        Write-Host "Current visibility: $(if ($repoInfo.private) { 'Private' } else { 'Public' })"
      } catch {
        $statusCode = $_.Exception.Response.StatusCode.value__
        if ($statusCode -eq 404) {
          Write-Host "⚠️  Repository does not exist on GitHub (404)"
          $repoExists = $false
        } else {
          Write-Host "❌ Error checking repository (Status: $statusCode)"
          Write-Host "Error: $($_.Exception.Message)"
          exit 1
        }
      }
      
      if (-not $repoExists) {
        Write-Host "===== Creating GitHub repository (Private) ====="
        $repoName = ($env:GITHUB_REPO -split '/')[1]
        $owner = ($env:GITHUB_REPO -split '/')[0]
        
        $body = @{
          name = $repoName
          description = "Synced from GitLab"
          private = $true
          auto_init = $false
        } | ConvertTo-Json
        
        try {
          $createUrl = "https://api.github.com/user/repos"
          
          $response = Invoke-RestMethod `
            -Uri $createUrl `
            -Headers @{
              Authorization = "token ${env:GITHUB_TOKEN}"
              Accept = "application/vnd.github.v3+json"
            } `
            -Method Post `
            -Body $body `
            -ContentType "application/json" `
            -ErrorAction Stop
          
          Write-Host "✅ Private repository created successfully: ${env:GITHUB_REPO}"
          Start-Sleep -Seconds 3
        } catch {
          Write-Host "❌ Failed to create repository"
          Write-Host "Error: $($_.Exception.Message)"
          if ($_.ErrorDetails.Message) {
            Write-Host "Details: $($_.ErrorDetails.Message)"
          }
          exit 1
        }
      } else {
        if ($repoInfo -and -not $repoInfo.private) {
          Write-Host "===== Converting repository to Private ====="
          $updateBody = @{
            private = $true
          } | ConvertTo-Json
          
          try {
            $response = Invoke-RestMethod `
              -Uri "https://api.github.com/repos/${env:GITHUB_REPO}" `
              -Headers @{
                Authorization = "token ${env:GITHUB_TOKEN}"
                Accept = "application/vnd.github.v3+json"
              } `
              -Method Patch `
              -Body $updateBody `
              -ContentType "application/json" `
              -ErrorAction Stop
            
            Write-Host "✅ Repository converted to Private"
          } catch {
            Write-Host "⚠️  Warning: Failed to convert repository to private"
            Write-Host "Error: $($_.Exception.Message)"
            Write-Host "Continuing with sync..."
          }
        } else {
          Write-Host "✅ Repository is already Private"
        }
      }
      
      Write-Host "===== Adding GitHub remote ====="
      git fetch --all
      git remote add github https://${env:GITHUB_TOKEN}@github.com/${env:GITHUB_REPO}.git 2>$null
      if ($LASTEXITCODE -ne 0) {
        git remote set-url github https://${env:GITHUB_TOKEN}@github.com/${env:GITHUB_REPO}.git
      }
      
      Write-Host "===== Pushing to GitHub ====="
      if (-not $repoExists) {
        git push github HEAD:main
      } else {
        git push github HEAD:main --force
      }
      
      Write-Host "✅ Successfully synced to GitHub (Private): https://github.com/${env:GITHUB_REPO}"
  when: on_success
