# Windows PowerShell用 .gitlab-ci.yml（修正版・完全動作）

stages:
  - verify
  - convert
  - build
  - deploy
  - sync

variables:
  npm_config_cache: "C:\\npm-cache"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - C:\\npm-cache
    - node_modules/
    - .next/cache/

# =========================
# verify
# =========================
verify:
  stage: verify
  tags:
    - windows
  before_script:
    - git config --global core.longPaths true
  script:
    - |
      Write-Host "===== Verifying project structure ====="
      Get-ChildItem
      Write-Host "===== Checking components directory ====="
      if (Test-Path components) { Get-ChildItem components } else { Write-Host "components directory not found!" }
      Write-Host "===== Checking app directory ====="
      if (Test-Path app) { Get-ChildItem app } else { Write-Host "app directory not found!" }
      Write-Host "===== Checking tsconfig.json ====="
      if (Test-Path tsconfig.json) { Get-Content tsconfig.json } else { Write-Host "tsconfig.json not found!" }
      Write-Host "===== Checking package.json ====="
      Get-Content package.json
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop")'

# =========================
# convert
# =========================
convert-colors:
  stage: convert
  tags:
    - windows
  before_script:
    - git config --global core.longPaths true
    - npm cache clean --force
  script:
    - |
      Write-Host "Node:" (node --version)
      Write-Host "NPM:" (npm --version)

      if (Test-Path package-lock.json) {
        npm ci --prefer-offline --no-audit
      } else {
        npm install --prefer-offline --no-audit
      }

      if (Test-Path scripts/convert-colors.js) {
        npm run convert-colors
      } else {
        Write-Host "⚠️ convert-colors.js not found, skipping"
      }
  artifacts:
    paths:
      - app/
      - components/
    expire_in: 1 hour
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop")'

# =========================
# build
# =========================
build:
  stage: build
  tags:
    - windows
  dependencies:
    - convert-colors
  before_script:
    - git config --global core.longPaths true
    - npm cache clean --force
  script:
    - |
      Write-Host "===== Build ====="

      if (Test-Path package-lock.json) {
        npm ci --prefer-offline --no-audit
      } else {
        npm install --prefer-offline --no-audit
      }

      npm run build
  artifacts:
    paths:
      - out/
    expire_in: 1 hour
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop")'

# =========================
# GitLab Pages
# =========================
pages:
  stage: deploy
  tags:
    - windows
  dependencies:
    - build
  before_script:
    - git config --global core.longPaths true
  script:
    - |
      Write-Host "===== Deploy GitLab Pages ====="

      if (-not (Test-Path public)) {
        New-Item -ItemType Directory -Path public | Out-Null
      }

      if (Test-Path out) {
        Copy-Item out/* public/ -Recurse -Force
      } else {
        Write-Error "out/ directory not found"
        exit 1
      }
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'

# =========================
# Cloudflare Pages
# =========================
deploy_cloudflare_pages:
  stage: deploy
  tags:
    - windows
  dependencies:
    - build
  before_script:
    - npm install -g wrangler
  script:
    - |
      Write-Host "===== Deploy Cloudflare Pages ====="

      if (-not $env:CLOUDFLARE_API_TOKEN) {
        Write-Error "CLOUDFLARE_API_TOKEN is not set"
        exit 1
      }
      if (-not $env:CLOUDFLARE_ACCOUNT_ID) {
        Write-Error "CLOUDFLARE_ACCOUNT_ID is not set"
        exit 1
      }
      if (-not $env:CLOUDFLARE_PROJECT_NAME) {
        Write-Error "CLOUDFLARE_PROJECT_NAME is not set"
        exit 1
      }

      wrangler pages deploy out `
        --project-name $env:CLOUDFLARE_PROJECT_NAME `
        --branch main `
        --commit-dirty true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'

# =========================
# GitHub Sync (Private)
# =========================
sync_to_github:
  stage: sync
  tags:
    - windows
  before_script:
    - git config --global core.longPaths true
  script:
    - |
      $ProgressPreference = 'SilentlyContinue'

      git config --global user.name "GitLab CI"
      git config --global user.email "ci@gitlab.com"

      git fetch --all
      git remote add github https://${env:GITHUB_TOKEN}@github.com/${env:GITHUB_REPO}.git 2>$null
      if ($LASTEXITCODE -ne 0) {
        git remote set-url github https://${env:GITHUB_TOKEN}@github.com/${env:GITHUB_REPO}.git
      }

      git push github HEAD:main --force
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
