image: node:20

stages:
  - verify
  - convert      # 🆕 色変換ステージを追加
  - build
  - deploy
  - sync         # 🆕 GitHub同期ステージを追加

variables:
   # NODE_ENV=production は ビルド後のみ に使うのでコメントアウト
   # NODE_ENV: production
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm
    - node_modules/
    - .next/cache/

# ファイル構造を確認
verify:
  stage: verify
  script:
    - echo "===== Verifying project structure ====="
    - ls -la
    - echo "===== Checking components directory ====="
    - ls -la components/ || echo "components directory not found!"
    - echo "===== Checking app directory ====="
    - ls -la app/
    - echo "===== Checking tsconfig.json ====="
    - cat tsconfig.json || echo "tsconfig.json not found!"
    - echo "===== Checking package.json ====="
    - cat package.json
  only:
    - main
    - develop

# 🆕 色の一括変換ステージ
convert-colors:
  stage: convert
  before_script:
    - echo "Node version:" $(node --version)
    - echo "NPM version:" $(npm --version)
  script:
    - echo "===== Installing dependencies ====="
    - |
      if [ -f package-lock.json ]; then
        npm ci --prefer-offline --no-audit
      else
        npm install --prefer-offline --no-audit
      fi
    - echo "===== Converting colors from red to yellow ====="
    - |
      if [ -f scripts/convert-colors.js ]; then
        npm run convert-colors
      else
        echo "⚠️  Warning: scripts/convert-colors.js not found, skipping color conversion"
      fi
    - echo "===== Color conversion completed ====="
  artifacts:
    paths:
      - app/
      - components/
    expire_in: 1 hour
  only:
    - main
    - develop

build:
  stage: build
  dependencies:
    - convert-colors  # 🆕 色変換の成果物を使用
  before_script:
    - echo "Node version:" $(node --version)
    - echo "NPM version:" $(npm --version)
  script:
    - echo "===== Starting build process ====="
    - |
      if [ -f package-lock.json ]; then
        npm ci --prefer-offline --no-audit
      else
        npm install --prefer-offline --no-audit
      fi
    - npm run build
    # GitLab Pages は SSR をサポートしないため、必ず next export を使う必要があるが、Next.js 15では、を実行すると自動的にエクスポートも行われるので不要
    # - npm run export
    # - mv out public
  artifacts:
    paths:
      - out/
    expire_in: 1 hour
  only:
    - main
    - develop

pages:
  stage: deploy
  dependencies:
    - build
  script:
    - echo "===== Deploying to GitLab Pages ====="
    - mkdir -p public
    # ↓ 修正: out/フォルダが存在するか確認してからコピー
    - |
      if [ -d "out" ]; then
        cp -r out/* public/
      else
        echo "エラー: out/フォルダが見つかりません"
        echo "利用可能なフォルダ:"
        ls -la
        exit 1
      fi
  artifacts:
    paths:
      - public
  only:
    - main

# 🆕 GitHubへの同期ジョブ
sync_to_github:
  stage: sync
  image: alpine/git:latest
  only:
    - main
  before_script:
    - echo "===== Preparing GitHub sync ====="
    # トークンが設定されているか確認
    - |
      if [ -z "$GITHUB_TOKEN" ]; then
        echo "❌ Error: GITHUB_TOKEN is not set"
        exit 1
      fi
    - |
      if [ -z "$GITHUB_REPO" ]; then
        echo "❌ Error: GITHUB_REPO is not set"
        exit 1
      fi
  script:
    - echo "===== Syncing to GitHub ====="
    # Gitの設定
    - git config --global user.name "${GITLAB_USER_NAME:-GitLab CI}"
    - git config --global user.email "${GITLAB_USER_EMAIL:-ci@gitlab.com}"
    
    # 全てのブランチとタグを取得
    - git fetch --unshallow || git fetch --all
    
    # GitHubリモートを追加（既に存在する場合はURLを更新）
    - git remote add github https://${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git 2>/dev/null || git remote set-url github https://${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git
    
    # mainブランチをGitHubにプッシュ
    - git push github HEAD:main --force
    
    - echo "✅ Successfully synced to GitHub"
  after_script:
    # セキュリティのためリモートを削除
    - git remote remove github 2>/dev/null || true
  when: on_success  # 前のステージ（deploy）が成功した場合のみ実行
