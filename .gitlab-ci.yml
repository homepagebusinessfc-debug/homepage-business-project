# Windows PowerShell用 .gitlab-ci.yml（修正版・安定版）

stages:
  - verify
  - convert
  - build
  - deploy
  - sync

variables:
  npm_config_cache: "C:\\npm-cache"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/
    - .next/

# ====================
# verify
# ====================
verify:
  stage: verify
  tags:
    - windows
  before_script:
    - git config --global core.longPaths true
  script:
    - |
      Write-Host "===== Verifying project structure ====="
      Get-ChildItem
      if (Test-Path components) { Get-ChildItem components }
      if (Test-Path app) { Get-ChildItem app }
      if (Test-Path package.json) { Get-Content package.json }
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ====================
# convert
# ====================
convert-colors:
  stage: convert
  tags:
    - windows
  before_script:
    - git config --global core.longPaths true
    - npm cache clean --force
  script:
    - |
      Write-Host "===== Installing dependencies ====="
      if (Test-Path package-lock.json) {
        npm ci --no-audit
      } else {
        npm install --no-audit
      }

      if (Test-Path scripts/convert-colors.js) {
        npm run convert-colors
      } else {
        Write-Host "convert script not found – skipping"
      }
  artifacts:
    paths:
      - app/
      - components/
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ====================
# build
# ====================
build:
  stage: build
  tags:
    - windows
  dependencies:
    - convert-colors
  before_script:
    - npm cache clean --force
  script:
    - |
      if (Test-Path package-lock.json) {
        npm ci --no-audit
      } else {
        npm install --no-audit
      }
      npm run build
  artifacts:
    paths:
      - out/
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ====================
# GitLab Pages
# ====================
pages:
  stage: deploy
  tags:
    - windows
  dependencies:
    - build
  script:
    - |
      if (-not (Test-Path public)) {
        New-Item -ItemType Directory -Path public
      }
      Copy-Item out\* public\ -Recurse -Force
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ====================
# Cloudflare Pages（修正ポイント）
# ====================
deploy_cloudflare_pages:
  stage: deploy
  tags:
    - windows
  dependencies:
    - build
  before_script:
    - npm install --no-audit --no-fund wrangler
  script:
    - |
      Write-Host "===== Deploy Cloudflare Pages ====="
      npx wrangler pages deploy out `
        --project-name $env:CLOUDFLARE_PROJECT_NAME `
        --branch main
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ====================
# GitHub Sync
# ====================
sync_to_github:
  stage: sync
  tags:
    - windows
  variables:
    GIT_DEPTH: 0  # shallow cloneを無効化し、完全な履歴を取得
  script:
    - |
      Write-Host "===== Syncing to GitHub ====="
      
      # Git設定
      git config --global user.name "GitLab CI"
      git config --global user.email "ci@gitlab.com"
      
      # 現在のブランチとコミット情報を確認
      Write-Host "Current branch: $(git branch --show-current)"
      Write-Host "Current commit: $(git rev-parse HEAD)"
      
      # すべてのリモートブランチを取得
      git fetch --all --prune --unshallow 2>$null
      
      # GitHub remoteの設定
      git remote remove github 2>$null
      git remote add github https://${env:GITHUB_TOKEN}@github.com/${env:GITHUB_REPO}.git
      
      # GitHub側のリポジトリ状態を確認
      Write-Host "Fetching GitHub repository state..."
      git fetch github
      
      # mainブランチを明示的にチェックアウト
      git checkout -B main
      
      # force-with-leaseを使用した安全なforce push
      # これにより、誤って他の変更を上書きするリスクを軽減
      try {
          git push github main:main --force-with-lease
      } catch {
          Write-Host "Force-with-lease failed. Trying standard force push..."
          git push github main:main --force
      }
      
      Write-Host "===== Sync completed successfully ====="
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  allow_failure: false