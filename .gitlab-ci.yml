image: node:20

stages:
  - verify
  - convert
  - build
  - deploy
  - sync

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm
    - node_modules/
    - .next/cache/

# ファイル構造を確認
verify:
  stage: verify
  script:
    - echo "===== Verifying project structure ====="
    - ls -la
    - echo "===== Checking components directory ====="
    - ls -la components/ || echo "components directory not found!"
    - echo "===== Checking app directory ====="
    - ls -la app/
    - echo "===== Checking tsconfig.json ====="
    - cat tsconfig.json || echo "tsconfig.json not found!"
    - echo "===== Checking package.json ====="
    - cat package.json
  only:
    - main
    - develop

# 色の一括変換ステージ
convert-colors:
  stage: convert
  before_script:
    - echo "Node version:" $(node --version)
    - echo "NPM version:" $(npm --version)
  script:
    - echo "===== Installing dependencies ====="
    - |
      if [ -f package-lock.json ]; then
        npm ci --prefer-offline --no-audit
      else
        npm install --prefer-offline --no-audit
      fi
    - echo "===== Converting colors from red to yellow ====="
    - |
      if [ -f scripts/convert-colors.js ]; then
        npm run convert-colors
      else
        echo "⚠️  Warning: scripts/convert-colors.js not found, skipping color conversion"
      fi
    - echo "===== Color conversion completed ====="
  artifacts:
    paths:
      - app/
      - components/
    expire_in: 1 hour
  only:
    - main
    - develop

build:
  stage: build
  dependencies:
    - convert-colors
  before_script:
    - echo "Node version:" $(node --version)
    - echo "NPM version:" $(npm --version)
  script:
    - echo "===== Starting build process ====="
    - |
      if [ -f package-lock.json ]; then
        npm ci --prefer-offline --no-audit
      else
        npm install --prefer-offline --no-audit
      fi
    - npm run build
  artifacts:
    paths:
      - out/
    expire_in: 1 hour
  only:
    - main
    - develop

pages:
  stage: deploy
  dependencies:
    - build
  script:
    - echo "===== Deploying to GitLab Pages ====="
    - mkdir -p public
    - |
      if [ -d "out" ]; then
        cp -r out/* public/
      else
        echo "エラー: out/フォルダが見つかりません"
        echo "利用可能なフォルダ:"
        ls -la
        exit 1
      fi
  artifacts:
    paths:
      - public
  only:
    - main

# GitHubへの同期ジョブ（シンプル版）
sync_to_github:
  stage: sync
  image: alpine/git:latest
  only:
    - main
  script:
    - echo "===== Syncing to GitHub ====="
    - git config --global user.name "GitLab CI"
    - git config --global user.email "ci@gitlab.com"
    - git fetch --all
    - git remote add github https://${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git || git remote set-url github https://${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git
    - git push github HEAD:main --force
    - echo "✅ Successfully synced to GitHub"
  when: on_success
