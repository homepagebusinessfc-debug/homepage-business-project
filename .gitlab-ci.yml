image: node:20

stages:
  - verify
  - convert      # 🆕 色変換ステージを追加
  - build
  - deploy

variables:
   # NODE_ENV=production は ビルド後のみ に使うのでコメントアウト
   # NODE_ENV: production
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm
    - node_modules/
    - .next/cache/

# ファイル構造を確認
verify:
  stage: verify
  script:
    - echo "===== Verifying project structure ====="
    - ls -la
    - echo "===== Checking components directory ====="
    - ls -la components/ || echo "components directory not found!"
    - echo "===== Checking app directory ====="
    - ls -la app/
    - echo "===== Checking tsconfig.json ====="
    - cat tsconfig.json || echo "tsconfig.json not found!"
    - echo "===== Checking package.json ====="
    - cat package.json
  only:
    - main
    - develop

# 🆕 色の一括変換ステージ
convert-colors:
  stage: convert
  before_script:
    - echo "Node version:" $(node --version)
    - echo "NPM version:" $(npm --version)
  script:
    - echo "===== Installing dependencies ====="
    - |
      if [ -f package-lock.json ]; then
        npm ci --prefer-offline --no-audit
      else
        npm install --prefer-offline --no-audit
      fi
    - echo "===== Converting colors from red to yellow ====="
    - |
      if [ -f scripts/convert-colors.js ]; then
        npm run convert-colors
      else
        echo "⚠️  Warning: scripts/convert-colors.js not found, skipping color conversion"
      fi
    - echo "===== Color conversion completed ====="
  artifacts:
    paths:
      - app/
      - components/
    expire_in: 1 hour
  only:
    - main
    - develop

build:
  stage: build
  dependencies:
    - convert-colors  # 🆕 色変換の成果物を使用
  before_script:
    - echo "Node version:" $(node --version)
    - echo "NPM version:" $(npm --version)
  script:
    - echo "===== Starting build process ====="
    - |
      if [ -f package-lock.json ]; then
        npm ci --prefer-offline --no-audit
      else
        npm install --prefer-offline --no-audit
      fi
    - npm run build
    # GitLab Pages は SSR をサポートしないため、必ず next export を使う必要があるが、Next.js 15では、を実行すると自動的にエクスポートも行われるので不要
    # - npm run export
    # - mv out public
  artifacts:
    paths:
      - out/
    expire_in: 1 hour
  only:
    - main
    - develop

pages:
  stage: deploy
  dependencies:
    - build
  script:
    - echo "===== Deploying to GitLab Pages ====="
    - mkdir -p public
    # ↓ 修正: out/フォルダが存在するか確認してからコピー
    - |
      if [ -d "out" ]; then
        cp -r out/* public/
      else
        echo "エラー: out/フォルダが見つかりません"
        echo "利用可能なフォルダ:"
        ls -la
        exit 1
      fi
  artifacts:
    paths:
      - public
  only:
    - main