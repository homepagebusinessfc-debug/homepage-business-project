# ============================================================
# GitLab Shared Runner用 .gitlab-ci.yml（Linux / node:20）
# 【用途】一度だけShared Runnerで動かし、GitHubにコードを同期する
# 【動作】
#   verify → convert → build → deploy（GitLab Pages + Cloudflare Pages）→ sync（GitHub）
# ============================================================

image: node:20

stages:
  - verify
  - convert
  - build
  - deploy
  - sync

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/
    - node_modules/
    - .next/cache/


# ====================
# verify
# ====================

verify:
  stage: verify
  script:
    - echo "===== Verifying project structure ====="
    - ls -la
    - echo "===== Checking components directory ====="
    - ls -la components/ || echo "components directory not found!"
    - echo "===== Checking app directory ====="
    - ls -la app/
    - echo "===== Checking tsconfig.json ====="
    - cat tsconfig.json || echo "tsconfig.json not found!"
    - echo "===== Checking package.json ====="
    - cat package.json
  only:
    - main
    - develop


# ====================
# convert
# ====================

convert-colors:
  stage: convert
  before_script:
    - echo "Node version:" $(node --version)
    - echo "NPM version:" $(npm --version)
  script:
    - echo "===== Installing dependencies ====="
    - |
      if [ -f package-lock.json ]; then
        npm ci --prefer-offline --no-audit
      else
        npm install --prefer-offline --no-audit
      fi
    - echo "===== Converting colors ====="
    - |
      if [ -f scripts/convert-colors.js ]; then
        npm run convert-colors
      else
        echo "Warning: scripts/convert-colors.js not found - skipping"
      fi
    - echo "===== Color conversion completed ====="
  artifacts:
    paths:
      - app/
      - components/
    expire_in: 1 hour
  only:
    - main
    - develop


# ====================
# build
# ====================

build:
  stage: build
  dependencies:
    - convert-colors
  before_script:
    - echo "Node version:" $(node --version)
    - echo "NPM version:" $(npm --version)
  script:
    - echo "===== Starting build process ====="
    - |
      if [ -f package-lock.json ]; then
        npm ci --prefer-offline --no-audit
      else
        npm install --prefer-offline --no-audit
      fi
    - npm run build
  artifacts:
    paths:
      - out/
    expire_in: 1 hour
  only:
    - main
    - develop


# ====================
# GitLab Pages
# ====================

pages:
  stage: deploy
  dependencies:
    - build
  script:
    - echo "===== Deploying to GitLab Pages ====="
    - mkdir -p public
    - |
      if [ -d "out" ]; then
        cp -r out/* public/
      else
        echo "エラー: out/ フォルダが見つかりません"
        ls -la
        exit 1
      fi
  artifacts:
    paths:
      - public
  only:
    - main


# ====================
# Cloudflare Pages
# （Windows版から移植・Linux向けに調整）
# 【必要なGitLab CI/CD変数】
#   CLOUDFLARE_API_TOKEN  : CloudflareのAPIトークン
#   CLOUDFLARE_ACCOUNT_ID : CloudflareのアカウントID
#   CLOUDFLARE_PROJECT_NAME: Cloudflare PagesのプロジェクトR名
# ====================

deploy_cloudflare_pages:
  stage: deploy
  dependencies:
    - build
  before_script:
    - echo "===== Installing Wrangler ====="
    - npm install --no-audit --no-fund wrangler
    - echo "Wrangler version:" $(npx wrangler --version)
  script:
    - echo "===== Deploy to Cloudflare Pages ====="
    - |
      if [ -d "out" ]; then
        CLOUDFLARE_ACCOUNT_ID=$CLOUDFLARE_ACCOUNT_ID \
        CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN \
        npx wrangler pages deploy out \
          --project-name $CLOUDFLARE_PROJECT_NAME \
          --branch main
        echo "✅ Cloudflare Pages deploy completed"
      else
        echo "エラー: out/ フォルダが見つかりません"
        exit 1
      fi
  only:
    - main


# ====================
# GitHub Sync
# GitLabのコードをGitHubに同期する
# 【改善ポイント（Windows版から移植）】
#   - GIT_DEPTH: 0 で完全な履歴を取得
#   - GIT_STRATEGY: clone で毎回クリーンな状態（ファイルが確実に届く）
#   - shallow clone 判定ロジックを追加
#   - デバッグログを追加
# 【必要なGitLab CI/CD変数】
#   GITHUB_TOKEN : GitHubのPersonal Access Token（repo権限）
#   GITHUB_REPO  : 例) your-username/your-repo-name
# ====================

sync_to_github:
  stage: sync
  image: alpine:latest
  variables:
    GIT_DEPTH: 0          # shallow cloneを無効化（ファイルが確実に届く）
    GIT_STRATEGY: clone   # 毎回クリーンなcloneを実行
  before_script:
    - echo "===== Installing Git ====="
    - apk add --no-cache git
    - echo "Git version:" $(git --version)
  script:
    - echo "===== Syncing to GitHub ====="

    # Git設定
    - git config --global user.name "GitLab CI"
    - git config --global user.email "ci@gitlab.com"

    # 現在の状態を確認（デバッグ用）
    - echo "Current branch:" $(git branch --show-current)
    - echo "Current commit:" $(git rev-parse HEAD)
    - echo "Files in repository:"
    - ls -la

    # shallow cloneの場合は完全な履歴に変換
    - |
      IS_SHALLOW=$(git rev-parse --is-shallow-repository)
      if [ "$IS_SHALLOW" = "true" ]; then
        echo "Unshallowing repository..."
        git fetch --unshallow
      else
        git fetch --all --prune
      fi

    # GitHub remoteを設定
    - git remote remove github 2>/dev/null || true
    - git remote add github https://${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git
    - echo "GitHub remote configured:" $GITHUB_REPO

    # mainブランチに切り替え
    - git checkout -B main

    # pushする内容を確認（デバッグ用）
    - echo "Commits to push:"
    - git log --oneline -5

    # GitHub へ push（force pushで確実に同期）
    - echo "Pushing to GitHub..."
    - git push github main:main --force

    - echo "✅ Successfully synced to GitHub"
  only:
    - main
  when: on_success
  allow_failure: false
