backend:
  name: gitlab
  repo: homepage-business-group/homepage-business-project
  branch: main
  auth_type: implicit
  app_id: YOUR_NETLIFY_APP_ID

media_folder: "/uploads"
public_folder: "/uploads"

collections:
  - name: "pages"
    label: "Pages"
    folder: "content/pages"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }
