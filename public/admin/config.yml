backend:
  name: gitlab
  repo: homepage-business-group/homepage-business-project
  branch: main
  auth_type: pkce  # ← implicitからpkceに変更
  app_id: e9263f79115e4efa912d71cd06681c9d051e578a5625828b42a135c18bb8ded4  # ← ステップ1でコピーしたApplication IDに置き換え
  base_url: https://gitlab.com  # ← 追加

# メディアファイルの保存先
media_folder: "public/uploads"
public_folder: "/uploads"

# コレクション設定
collections:
  # ページコレクション
  - name: "pages"
    label: "Pages"
    folder: "content/pages"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Featured Image", name: "thumbnail", widget: "image", required: false }

  # ブログ投稿コレクション（オプション）
  - name: "blog"
    label: "Blog"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Featured Image", name: "thumbnail", widget: "image", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
